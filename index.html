<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>New tab</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌙</text></svg>" />
  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <header class="greeting">
      <div class="greeting-text">
        <p class="greeting-date" id="date"></p>
        <h1 class="greeting-title" id="greeting"></h1>
      </div>

      <form id="search-form" class="search-form" role="search" autocomplete="off">
        <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="11" cy="11" r="7"></circle>
          <path d="m21 21-4.3-4.3"></path>
        </svg>
        <input
          id="search-input"
          class="search-input"
          type="text"
          placeholder="Search or enter a URL"
          autocomplete="off"
          autocapitalize="off"
          spellcheck="false"
          autofocus
        />
      </form>
    </header>

    <div class="layout">
      <section class="main" aria-label="GitHub activity">
        <div class="section-header">
          <h2 class="section-title">Shipped</h2>
          <p class="section-meta" id="log-user"></p>
        </div>

        <div class="heatmap" id="heatmap"></div>

        <div class="stats" id="stats"></div>

        <div class="shipped-list" id="log">
          <p class="log-empty">Loading…</p>
        </div>
      </section>

      <aside class="sidebar" aria-label="Shortcuts">
        <div class="section-header">
          <h2 class="section-title">Shortcuts</h2>
        </div>
        <nav class="shortcuts" id="shortcuts"></nav>
      </aside>
    </div>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
